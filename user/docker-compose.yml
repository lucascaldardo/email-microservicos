services:
  ms-user-db:
    image: postgres:16
    container_name: ms-user-db
    environment:

      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ms-user-ms
    ports:
      - "5435:5432"
    volumes:
      - user_pgdata:/var/lib/postgresql/data

volumes:
  user_pgdata: