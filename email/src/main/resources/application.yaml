spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ms-email-ms
    username: postgres-email
    password: postgres-password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
